name: Auto Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'package.json'
      - 'CHANGELOG.md'
      - '.github/workflows/**'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Bump version and push tag
        id: bump_version
        run: |
          # 自动增加 patch 版本
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

          git add package.json
          git commit -m "chore: auto-release $NEW_VERSION [skip ci]"
          git tag "$NEW_VERSION"
          git push origin main --tags

          echo "tag=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build all platforms
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.tag }}
          name: Release ${{ steps.bump_version.outputs.tag }}
          files: |
            binaries/methodalgo-macos-arm64
            binaries/methodalgo-macos-x64
            binaries/methodalgo-win-x64.exe
            binaries/methodalgo-linux-x64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
